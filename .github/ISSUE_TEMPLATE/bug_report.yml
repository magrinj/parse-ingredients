name: Bug Report
description: Report a bug with @magrinj/parse-ingredients
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the fields below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Call `parse('...')`
        2. ...
        3. See unexpected result
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: library-version
    attributes:
      label: Library Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: locale
    attributes:
      label: Locale
      options:
        - English (en)
        - French (fr)
        - Spanish (es)
        - Italian (it)
        - German (de)
        - Portuguese (pt)
    validations:
      required: true

  - type: input
    id: reproduction-link
    attributes:
      label: Minimal Reproduction
      description: Link to a minimal reproduction (GitHub repo, CodeSandbox, etc.)
      placeholder: "https://github.com/..."
    validations:
      required: false
